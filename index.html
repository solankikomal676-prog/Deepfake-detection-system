<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detection System</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --fake-color: #ef4444;
            --real-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2rem;
            color: var(--text-color);
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(99, 102, 241, 0.05);
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        #fileInput {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results Box */
        #resultBox {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background: #111827;
            text-align: left;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        .badge.FAKE { background-color: var(--fake-color); color: white; }
        .badge.REAL { background-color: var(--real-color); color: white; }
        
        #fileNameDisplay {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Deepfake Detector AI</h1>
    <p class="subtitle">Upload an image or video to analyze authenticity</p>

    <form id="uploadForm">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <p style="margin: 5px 0;">Drag & drop or <strong>Browse</strong> to choose</p>
            <p style="font-size: 0.8rem; color: #64748b;">Supports: PNG, JPG, JPEG, MP4, AVI, MOV</p>
            <input type="file" id="fileInput" name="file" accept="image/*,video/*">
            <div id="fileNameDisplay"></div>
        </div>
        
        <button type="submit" class="btn">Analyze File</button>
    </form>

    <div class="loader" id="loader"></div>

    <div id="resultBox">
        <h3 style="margin-top: 0; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 8px;">Analysis Result</h3>
        <div class="result-row">
            <span>Detected Format:</span>
            <span id="resType" style="font-weight: bold;">-</span>
        </div>
        <div class="result-row">
            <span>Classification:</span>
            <span id="resLabel" class="badge">-</span>
        </div>
        <div class="result-row">
            <span>AI Confidence:</span>
            <span id="resConfidence" style="color: #6366f1; font-weight: bold;">-</span>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const uploadForm = document.getElementById('uploadForm');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');

    // Show selected filename
    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            fileNameDisplay.textContent = `Selected: ${e.target.files[0].name}`;
        }
    });

    // Handle form submit asynchronously
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (fileInput.files.length === 0) {
            alert("Please select a file first!");
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        // Reset UI state
        resultBox.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            loader.style.display = 'none';

            if (data.success) {
                document.getElementById('resType').textContent = data.file_type;
                
                const labelBadge = document.getElementById('resLabel');
                labelBadge.textContent = data.label;
                labelBadge.className = `badge ${data.label}`; // Dynamic coloring
                
                document.getElementById('resConfidence').textContent = data.confidence;
                
                resultBox.style.display = 'block';
            } else {
                alert(data.error || "An error occurred during analysis.");
            }
        } catch (error) {
            loader.style.display = 'none';
            alert("Failed to connect to the backend server.");
            console.error(error);
        }
    });
</script>

</body>
</html>
